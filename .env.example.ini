# ===========================================
# ENVIRONMENT CONFIGURATION (EXAMPLE ONLY)
# Copy this file to ".env" and fill the values.
# ===========================================

# -----------------------------
# APPLICATION
# -----------------------------
APP_ENV=development
APP_NAME=NBS Toolkit API
APP_PORT=8000

# -----------------------------
# DATABASE CONFIG (PostgreSQL)
# -----------------------------
# Format:
# postgresql://USERNAME:PASSWORD@HOST:PORT/DATABASE?sslmode=require

DATABASE_URL=postgresql+psycopg://YOUR_USER:YOUR_PASSWORD@YOUR_HOST:5432/YOUR_DB?sslmode=require

# Example Azure PostgreSQL URL (structure only, NOT real):
# postgresql://username:password@nbsdatabase.postgres.database.azure.com:5432/nbs_database?sslmode=require

# -----------------------------
# CORS SETTINGS
# -----------------------------
# Comma-separated origins during development.
# Backend code reads CORS_ALLOW_ORIGINS, not CORS_ORIGINS.
CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:5173

# -----------------------------
# SEEDING
# -----------------------------
# Should the server seed the DB at startup? 
# (In production: ALWAYS FALSE)
SEED_ON_STARTUP=false

# -----------------------------
# LOGGING
# -----------------------------
LOG_LEVEL=INFO
