name: Deploy FastAPI to Azure Web App - nbsapi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 1) Checkout your repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 2) Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔹 3) Install dependencies (test build)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔹 4) Zip project for deployment
      - name: Zip application
        run: zip -r app.zip .

      # 🔹 5) Deploy using PUBLISH PROFILE
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "nbsapi"                     # MUST match your Azure Web App name
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
