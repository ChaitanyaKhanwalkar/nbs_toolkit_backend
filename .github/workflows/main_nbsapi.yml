name: Deploy FastAPI to Azure Web App - nbsapi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repository code.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Set up Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Install dependencies from the revamped backend package.
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 4a) Diagnostic: prove the canonical CI test DB and env are wired up.
      #     The SQLite canonical DB is tracked in git, so it is present in the
      #     CI checkout; backend/.env is gitignored, so CI must supply env here.
      #     (DATABASE_URL value is a non-secret local SQLite path; we print only
      #     a boolean for it, never the value.)
      - name: Verify CI test environment
        working-directory: backend
        env:
          APP_ENV: ci
          DATABASE_URL: "sqlite:///../canonical db/narmada_nbs_canonical.db"
          CORS_ALLOW_ORIGINS: "*"
        run: |
          python -c "from pathlib import Path; p=Path('../canonical db/narmada_nbs_canonical.db'); print('canonical db exists:', p.exists(), p.resolve()); assert p.exists()"
          python -c "import os; print('APP_ENV=', os.getenv('APP_ENV')); print('DATABASE_URL set=', bool(os.getenv('DATABASE_URL')))"

      # 4b) Run backend tests before any deployment package is created.
      #     CI has no backend/.env, so the canonical test DB must be wired via env.
      - name: Run backend tests
        working-directory: backend
        env:
          APP_ENV: ci
          DATABASE_URL: "sqlite:///../canonical db/narmada_nbs_canonical.db"
          CORS_ALLOW_ORIGINS: "*"
        run: python -m pytest -q

      # 5) Zip only backend/ so Azure receives app/ at package root.
      - name: Zip application
        run: |
          cd backend
          zip -r ../app.zip . \
            -x ".env" \
            -x ".venv/*" \
            -x ".venv_broken/*" \
            -x "data/*.db" \
            -x "__pycache__/*" \
            -x "*/__pycache__/*" \
            -x "*/*/__pycache__/*" \
            -x "*.pyc" \
            -x "tests/*"
          cd ..

      # 6) Print zip contents so app/main.py and requirements.txt are visible.
      - name: Verify deployment package
        run: unzip -l app.zip | head -120

      # 7) Deploy using the existing publish profile.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "nbsapi"                     # MUST match your Azure Web App name
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
