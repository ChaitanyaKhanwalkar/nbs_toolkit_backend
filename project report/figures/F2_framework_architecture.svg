<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 660" font-family="Georgia,'Times New Roman',serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#33485f"/>
    </marker>
    <style>
      .t{font-size:13px;fill:#13202e;font-weight:bold}
      .s{font-size:10.5px;fill:#4a5a6a}
      .h{font-size:14px;font-weight:bold;fill:#13202e}
      .ln{stroke:#33485f;stroke-width:1.8;fill:none}
      .gw{font-size:13px;font-weight:bold;fill:#ffffff}
      .gs{font-size:10.5px;fill:#dbe7f2}
    </style>
  </defs>
  <text x="20" y="28" class="h">Figure 2.  Framework architecture — from cited evidence to a sourced recommendation</text>

  <!-- A evidence -->
  <rect x="120" y="50" width="520" height="74" rx="9" fill="#eef3f8" stroke="#1f3a5f"/>
  <text x="380" y="74" text-anchor="middle" class="t">Evidence &amp; data layer</text>
  <text x="380" y="94" text-anchor="middle" class="s">104 cited sources · ambient water quality (CWC, 47,244 rows) · river network (HydroRIVERS, 6,339 reaches)</text>
  <text x="380" y="110" text-anchor="middle" class="s">district context (45) · NbS evidence base — removal efficiency, footprint, design (28 options)</text>

  <!-- B provenance -->
  <rect x="120" y="150" width="520" height="50" rx="9" fill="#e7f4f1" stroke="#2a9d8f"/>
  <text x="380" y="172" text-anchor="middle" class="t">Provenance layer</text>
  <text x="380" y="190" text-anchor="middle" class="s">every value tagged — cited / corroborated · derived (unconfirmed) · disclosed gap</text>

  <!-- C candidates -->
  <rect x="120" y="226" width="520" height="50" rx="9" fill="#f4f6f8" stroke="#33485f"/>
  <text x="380" y="248" text-anchor="middle" class="t">Candidate set</text>
  <text x="380" y="266" text-anchor="middle" class="s">28 NbS options composed into 8 treatment trains (pretreatment → secondary → polishing)</text>

  <!-- side input -->
  <rect x="500" y="312" width="240" height="58" rx="9" fill="#fbf3e2" stroke="#d9a441"/>
  <text x="620" y="334" text-anchor="middle" class="t">User input</text>
  <text x="620" y="352" text-anchor="middle" class="s">location (district) + intended use</text>

  <!-- D screening -->
  <rect x="120" y="312" width="330" height="58" rx="9" fill="#1f3a5f" stroke="#1f3a5f"/>
  <text x="285" y="334" text-anchor="middle" class="gw">Screening</text>
  <text x="285" y="352" text-anchor="middle" class="gs">hard safety &amp; feasibility filters</text>

  <!-- E scoring -->
  <rect x="120" y="406" width="520" height="64" rx="9" fill="#1f3a5f" stroke="#1f3a5f"/>
  <text x="380" y="430" text-anchor="middle" class="gw">Multi-criteria scoring</text>
  <text x="380" y="450" text-anchor="middle" class="gs">7 criteria × author-derived AHP weights (use-case-specific) → TOPSIS ranking</text>

  <!-- F output -->
  <rect x="120" y="506" width="520" height="58" rx="9" fill="#dff0ea" stroke="#2a9d8f"/>
  <text x="380" y="528" text-anchor="middle" class="t">Recommendation</text>
  <text x="380" y="546" text-anchor="middle" class="s">ranked treatment trains + confidence labels + inline sources</text>

  <!-- arrows -->
  <path class="ln" d="M380,124 L380,148" marker-end="url(#a2)"/>
  <path class="ln" d="M380,200 L380,224" marker-end="url(#a2)"/>
  <path class="ln" d="M380,276 L380,310" marker-end="url(#a2)"/>
  <path class="ln" d="M500,341 L452,341" marker-end="url(#a2)"/>
  <path class="ln" d="M285,370 L285,390 L380,390 L380,404" marker-end="url(#a2)"/>
  <path class="ln" d="M380,470 L380,504" marker-end="url(#a2)"/>

  <text x="20" y="620" class="s">Provenance is carried through every layer: each value entering screening or scoring retains its source and status, so the final recommendation is fully traceable.</text>
</svg>
